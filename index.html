<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW E46 M3 - Drift Culture</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        h1 span {
            color: #ff0055; /* Um toque de cor desportiva */
        }

        p {
            color: #aaa;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        /* Container responsivo para o vídeo não distorcer */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Proporção 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 2px solid #222;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>BMW E46 M3 <span>Drift</span></h1>
        <p>O equilíbrio perfeito entre o motor S54 e a tração traseira.</p>

        <div class="video-wrapper">
            <!-- Vídeo do YouTube configurado para iniciar num drift clássico de um E46 -->
            <iframe 
                src="https://www.youtube.com/embed/SshMh1Lz_gA" 
                title="BMW E46 M3 Drift" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                allowfullscreen>
            </iframe>
        </div>

        <footer>
            <p>Criado para os amantes da cultura M Power.</p>
        </footer>
    </div>

</body>
</html>
